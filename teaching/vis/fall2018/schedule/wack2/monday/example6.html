<!DOCTYPE html>
<html lang='en'>
	<head>
		<title>Javascript Example</title>
	</head>
	<body>
		<script type='text/javascript'>
			var circle = {
				cx:3,
				cy:10,
				cr:5,
			};
			circle['blah'] = 4;
			circle.foo = 'bar';
			circle.length = function()  {
				return Math.sqrt(this.cx*this.cx+this.cy*this.cy);
			}
			console.log(JSON.stringify(circle));
			console.log(circle.length());
			circle.cx = 5;
			console.log(circle.length());
		</script>
	</body>
</html>
