<!DOCTYPE html>
<html lang='en'>
	<head>
		<title>D3 Selection Example 0</title>
		<script type='text/javascript' src='d3.js'></script>
	</head>
		<svg id='svg' width='500' height='500'>
		</svg>
			<script type='text/javascript'>
			{
				var old_circle_data = [];
				for(var i = 0; i < 13; i++)  {
					var datum = {};
					datum.value = [10+30*Math.random(),10+30*Math.random()];
					datum.key = 'circle'+i;
					old_circle_data.push(datum);
				}
				d3.select('#svg').selectAll('circle').data(old_circle_data, function(d) { return d.key;}).enter().append('circle')

				var new_circle_data = [];
				new_circle_data.push({key:'circle10', value:[100+300*Math.random(),100+300*Math.random()]});
				new_circle_data.push({key:'circle2', value:[100+300*Math.random(),100+300*Math.random()]});
				new_circle_data.push({key:'circle5', value:[100+300*Math.random(),100+300*Math.random()]});
				new_circle_data.push({key:'circle20', value:[100+300*Math.random(),100+300*Math.random()]});

				var data_selection = d3.select('#svg').selectAll('circle').data(new_circle_data, function(d) { return d.key;})
				data_selection.exit().remove();
				data_selection.enter().append('circle')

				d3.selectAll('circle')
					.attr('cx', function(d) { return d.value[0]; })
					.attr('cy', function(d) { return d.value[1]; })
					.attr('r', 4);
			}
			</script>
	</body>
</html>
