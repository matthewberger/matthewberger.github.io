<!DOCTYPE html>
<html lang='en'>
	<head>
		<title>D3 Selection Example 6</title>
		<script type='text/javascript' src='d3.js'></script>
	</head>
		<svg id='svg' width='500' height='500'>
		</svg>

			<script type='text/javascript'>
			{
				var rect_floor = 450

				var bar_data = [];
				var n_bars = 20;
				var num_groups = 4;
				var group_colors = [];
				for(var i = 0; i < num_groups; i++)  {
					var bar_group = [];
					for(var j = 0; j < n_bars; j++)
						bar_group.push(rect_floor/20+(rect_floor-rect_floor/20)*Math.random());
					bar_data.push(bar_group);

					var h = 360.0*(0.5/num_groups+i/(num_groups+1)), s = 0.4, l = 0.8;
					group_colors.push(d3.hsl(h,s,l).toString());
				}

				var bar_width = 500 / ((n_bars)*num_groups);
				var group_width = 500 / num_groups;

				var bar_selection = d3.select('#svg').selectAll('g').data(bar_data).enter().append('g')
				bar_selection.selectAll('newrects').data(function(d)  { return d; }).enter().append('rect')
					.attr('class', 'barrect')

				var new_rect_floor = 50;
				for(var j = 0; j < n_bars; j++)
					bar_data[1][j] = new_rect_floor/20+(new_rect_floor-new_rect_floor/20)*Math.random();
				d3.select('#svg').selectAll('g').data(bar_data)
				//d3.selectAll('g').selectAll('.barrect').data(d => d)
			}
			</script>
	</body>
</html>
